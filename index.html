<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Cryptweb — Secure P2P File Sharing</title>
    <meta name="title" content="Cryptweb — Secure P2P File Sharing" />

      content="Cryptweb is a highly secure, serverless peer-to-peer file sharing platform. Share files instantly with AES-256 encryption, zero storage footprints, and absolute privacy."

      name="keywords"
      content="P2P file sharing, secure file transfer, encrypted file sharing, serverless file transfer, Cryptweb"
    />

    <link rel="canonical" href="https://cryptweb.example.com/" />

    <meta property="og:type" content="website" />

      property="og:description"

      content="Cryptweb Secure P2P Network Data Visualization"
